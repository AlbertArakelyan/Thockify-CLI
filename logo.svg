<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="keycapTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8562A"/>
      <stop offset="100%" stop-color="#C13B1B"/>
    </linearGradient>
    <linearGradient id="keycapFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A63218"/>
      <stop offset="100%" stop-color="#7A2510"/>
    </linearGradient>
    <linearGradient id="keycapSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B2C14"/>
      <stop offset="100%" stop-color="#6E2210"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#1E1E1E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#1A1A1A"/>
  <circle cx="256" cy="256" r="240" fill="#222222" stroke="#333" stroke-width="2"/>

  <!-- Subtle radial lines for "vibe" texture -->
  <g opacity="0.06">
    <line x1="256" y1="16" x2="256" y2="496" stroke="#E8562A" stroke-width="1"/>
    <line x1="16" y1="256" x2="496" y2="256" stroke="#E8562A" stroke-width="1"/>
    <line x1="86" y1="86" x2="426" y2="426" stroke="#E8562A" stroke-width="1"/>
    <line x1="426" y1="86" x2="86" y2="426" stroke="#E8562A" stroke-width="1"/>
  </g>

  <!-- Sound wave arcs - left side -->
  <g filter="url(#glow)">
    <path d="M 118 200 Q 98 256 118 312" fill="none" stroke="#E8562A" stroke-width="3.5" stroke-linecap="round" opacity="0.3"/>
    <path d="M 98 178 Q 68 256 98 334" fill="none" stroke="#E8562A" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
    <path d="M 78 158 Q 38 256 78 354" fill="none" stroke="#E8562A" stroke-width="2.5" stroke-linecap="round" opacity="0.1"/>
  </g>

  <!-- Sound wave arcs - right side -->
  <g filter="url(#glow)">
    <path d="M 394 200 Q 414 256 394 312" fill="none" stroke="#E8562A" stroke-width="3.5" stroke-linecap="round" opacity="0.3"/>
    <path d="M 414 178 Q 444 256 414 334" fill="none" stroke="#E8562A" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
    <path d="M 434 158 Q 474 256 434 354" fill="none" stroke="#E8562A" stroke-width="2.5" stroke-linecap="round" opacity="0.1"/>
  </g>

  <!-- Keyboard plate / base -->
  <g filter="url(#shadow)">
    <rect x="148" y="290" width="216" height="40" rx="6" fill="url(#plate)" stroke="#444" stroke-width="1"/>
    <!-- Plate shine -->
    <rect x="150" y="291" width="212" height="1" rx="1" fill="#555" opacity="0.5"/>
  </g>

  <!-- Keycap stem / connection -->
  <rect x="226" y="268" width="60" height="28" rx="2" fill="#4A4A4A"/>

  <!-- Keycap - 3D isometric style -->
  <g filter="url(#shadow)">
    <!-- Keycap right side -->
    <path d="M 338 260 L 338 220 L 348 200 L 348 240 Z" fill="url(#keycapSide)"/>
    <!-- Keycap front face -->
    <path d="M 164 260 L 338 260 L 348 240 L 174 240 Z" fill="url(#keycapFront)"/>
    <!-- Keycap top face -->
    <path d="M 174 200 L 348 200 L 338 220 L 164 220 Z" fill="url(#keycapTop)"/>
    <!-- Keycap left side -->
    <path d="M 164 260 L 164 220 L 174 200 L 174 240 Z" fill="#9A2E16"/>

    <!-- Top surface indent (dish) -->
    <path d="M 186 207 L 336 207 L 328 217 L 176 217 Z" fill="#B84420" opacity="0.5"/>

    <!-- Keycap legend - sound wave symbol -->
    <g transform="translate(256, 212)" opacity="0.9">
      <!-- Small speaker icon -->
      <polygon points="-12,-6 -6,-6 0,-12 0,12 -6,6 -12,6" fill="#FFD5C2"/>
      <!-- Mini waves -->
      <path d="M 4 -5 Q 9 0 4 5" fill="none" stroke="#FFD5C2" stroke-width="2" stroke-linecap="round"/>
      <path d="M 9 -9 Q 16 0 9 9" fill="none" stroke="#FFD5C2" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Impact vibration lines below keycap -->
  <g opacity="0.4">
    <line x1="200" y1="275" x2="180" y2="282" stroke="#E8562A" stroke-width="2" stroke-linecap="round"/>
    <line x1="256" y1="278" x2="256" y2="286" stroke="#E8562A" stroke-width="2" stroke-linecap="round"/>
    <line x1="312" y1="275" x2="332" y2="282" stroke="#E8562A" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Accent ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#E8562A" stroke-width="1.5" opacity="0.15"/>

  <!-- Bottom text arc - "MECHVIBES" -->
  <defs>
    <path id="textArc" d="M 120 256 A 136 136 0 0 1 392 256" fill="none"/>
    <path id="textArcBottom" d="M 136 310 A 160 160 0 0 0 376 310" fill="none"/>
  </defs>

  <text font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="28" letter-spacing="12" fill="#E8562A" opacity="0.8">
    <textPath href="#textArcBottom" startOffset="50%" text-anchor="middle">MECHVIBES</textPath>
  </text>

  <!-- Top subtle label -->
  <text x="256" y="140" font-family="'Segoe UI', Arial, sans-serif" font-weight="400" font-size="13" letter-spacing="6" fill="#666" text-anchor="middle" opacity="0.6">SOUND SIMULATOR</text>
</svg>
